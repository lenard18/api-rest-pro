server:
  port: 8080

spring:
  application:
    name: api-rest-pro

  datasource:
    url: jdbc:h2:mem:apidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

jwt:
  secret: "c2VjcmV0S2V5UGFyYUxlb25hcmRvR29tZXpQb3J0YWZvbGlvMjAyNlByb2plY3Q="
  expiration: 86400000   # 24 horas en ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
